# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: sphinx.project
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://118.70.33.126:8006
          client: '100'
        app:
          name: Z_PROJ_CONS
          description: projectcons
          package: ZPKG_12
          transport: SE6K900161
        exclude:
          - /test/
  resources:
    excludes:
      - /test/**
      - /localService/**
